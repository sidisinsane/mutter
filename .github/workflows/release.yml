# GoReleaser release workflow — triggers on version tag push (v*).
#
# CGO_ENABLED=1 is required by onnxruntime_go and prevents cross-compilation.
# Each OS builds natively on its own runner. GGOOS filters which targets each
# runner builds without affecting hooks or other build steps.
#
# Linux arm64 cross-compilation uses gcc-aarch64-linux-gnu, available on
# ubuntu-latest via apt. macOS builds natively for both amd64 and arm64.
#
# CI (ci.yml) must pass before tagging — tests are not repeated here.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.3

      - name: Install ARM64 cross-compiler
        run: sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --skip=announce
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPROXY: "https://proxy.golang.org,direct"
          GGOOS: linux

  release-macos:
    runs-on: macos-latest
    needs: release-linux
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --skip=validate --skip=announce
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPROXY: "https://proxy.golang.org,direct"
          GGOOS: darwin