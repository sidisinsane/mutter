# GoReleaser release workflow — triggers on version tag push (v*).
#
# Builds, packages, and publishes Go binaries using GoReleaser.
# Attaches build artifacts to a GitHub release automatically.
#
# CI (ci.yml) must pass before tagging a release — tests are not
# repeated here. The onnxruntime shared library is installed for
# linking only (CGO_ENABLED=1 required by onnxruntime_go).
#
# Note: GITHUB_TOKEN is provided automatically by GitHub Actions.
#       No secret configuration required.
#
# Prerequisites:
#   - Go 1.26.3 (default: 1.26.3)

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false # prevent mid-flight release leaving artifacts in a broken state

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # required for GoReleaser changelog and tag resolution

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.3

      - name: Install onnxruntime shared library
        run: |
          mkdir -p ~/.mutter/lib
          curl -L https://github.com/microsoft/onnxruntime/releases/download/v1.25.0/onnxruntime-linux-x64-1.25.0.tgz \
            | tar -xz -C /tmp
          cp /tmp/onnxruntime-linux-x64-1.25.0/lib/libonnxruntime.so.1.25.0 ~/.mutter/lib/
          echo "CGO_LDFLAGS=-L$HOME/.mutter/lib" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$HOME/.mutter/lib" >> "$GITHUB_ENV"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPROXY: "https://proxy.golang.org,direct"