# GoReleaser release workflow — triggers on version tag push (v*).
#
# Uses a matrix of native runners — one per OS — because CGO_ENABLED=1
# (required by onnxruntime_go) prevents cross-compilation. Each runner
# builds only for its own OS. GoReleaser's split/merge mode combines
# the artifacts into a single GitHub release.
#
# The onnxruntime shared library is NOT needed on the build host —
# it is loaded at runtime on the user's machine on first run.
#
# CI (ci.yml) must pass before tagging — tests are not repeated here.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --split
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPROXY: "https://proxy.golang.org,direct"
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Merge and publish release
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          args: continue --merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}