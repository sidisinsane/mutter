# CI workflow — triggers on push and pull requests to main.
#
# Verifies module hygiene and tests the codebase.
# Must pass before tagging a release.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26.3

      - name: Verify go.sum is complete
        run: go mod download && git diff --exit-code go.sum

      - name: Install onnxruntime shared library
        run: |
          mkdir -p ~/.mutter/lib
          curl -L https://github.com/microsoft/onnxruntime/releases/download/v1.25.0/onnxruntime-linux-x64-1.25.0.tgz \
            | tar -xz -C /tmp
          cp /tmp/onnxruntime-linux-x64-1.25.0/lib/libonnxruntime.so.1.25.0 ~/.mutter/lib/

      - name: Create workspace config
        run: |
          cat > mutter.yml << 'YAML'
          schema_version: "0.1.0"
          model:
            library_path: ~/.mutter/lib/libonnxruntime.so.1.25.0
          discovery:
            paths:
              - examples
            recursive: false
          YAML

      - name: Build
        run: go build ./...

      - name: Build (connectrpc)
        run: go build -tags connectrpc ./cmd/mutter-daemon/...

      - name: Run tests
        run: go test ./...